{% extends 'vault/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="d-flex align-items-center mb-4 mt-2">
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h3 class="fw-bold mb-0">➕ Add Password</h3>
        </div>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-muted">🌐 Website</label>
                        <input type="text" name="website" class="form-control"
                            placeholder="e.g. google.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">🗂 Category</label>
                        <select name="category" class="form-select">
                            <option value="social">🌐 Social</option>
                            <option value="banking">🏦 Banking</option>
                            <option value="work">💼 Work</option>
                            <option value="shopping">🛍 Shopping</option>
                            <option value="other" selected>📁 Other</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">🔑 Password</label>
                        <input type="text" name="password" id="passwordField"
                            class="form-control" placeholder="Enter or use suggested" required>
                        <div class="mt-2 p-2 rounded" style="background:#2a2a3e">
                            <small class="text-warning">
                                💡 <strong>Suggested:</strong>
                                <code id="suggested" style="color:#48cfad">{{ suggested }}</code>
                                <button type="button"
                                    class="btn btn-sm btn-outline-warning ms-2 py-0"
                                    onclick="usesuggested()">Use</button>
                            </small>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-save"></i> Save Password
                    </button>
                    <a href="{% url 'dashboard' %}"
                        class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function usesuggested() {
    document.getElementById('passwordField').value =
        document.getElementById('suggested').textContent;
}
</script>
{% endblock %}
