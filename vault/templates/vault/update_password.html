{% extends 'vault/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-secondary mt-4">
            <div class="card-body">
                <h3 class="card-title mb-4">✏️ Update Password</h3>
                <p class="text-muted">🌐 Website: <strong>{{ entry.website }}</strong></p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="text" name="password" class="form-control"
                            value="{{ decrypted }}" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">🔄 Update Password</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-light w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
