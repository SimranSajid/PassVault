{% extends 'vault/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <h1 style="font-size:3rem">📝</h1>
            <h3 class="fw-bold">Create Account</h3>
            <p class="text-muted">Start securing your passwords</p>
        </div>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-muted">Username</label>
                        <input type="text" name="username" class="form-control"
                            placeholder="Choose a username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Email (optional)</label>
                        <input type="email" name="email" class="form-control"
                            placeholder="your@email.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Password</label>
                        <input type="password" name="password1" class="form-control"
                            placeholder="Create a password" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Confirm Password</label>
                        <input type="password" name="password2" class="form-control"
                            placeholder="Confirm your password" required>
                    </div>
                    {% if form.errors %}
                        <div class="alert alert-danger">{{ form.errors }}</div>
                    {% endif %}
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-person-plus"></i> Create Account
                    </button>
                </form>
                <p class="text-center mt-3 text-muted">
                    Already have an account?
                    <a href="{% url 'login' %}" class="text-decoration-none">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
